<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<title>OSEA Reklam — Wireframe Keşfi</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Architects+Daughter&family=Kalam:wght@400;700&family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-faint: #8a8a8a;
    --paper: #f6f1e7;
    --paper-2: #efe9db;
    --rule: #2a2a2a;
    --gold: #b7892e;
    --gold-soft: #d9b769;
    --accent: #c44a2e;
  }
  html, body { margin: 0; background: #ece6d6; font-family: 'Kalam', 'Caveat', system-ui, sans-serif; color: var(--ink); }

  /* shared "sketch" primitives for the artboards */
  .wb { background: var(--paper); color: var(--ink); width: 100%; height: 100%; box-sizing: border-box;
        background-image:
          radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
        background-size: 22px 22px;
        background-position: 0 0;
        position: relative; overflow: hidden;
      }
  .wb .frame { position: absolute; inset: 0; border: 2px solid var(--rule); border-radius: 4px; pointer-events:none; }
  .wb .tag { position: absolute; top: -14px; left: 24px; background: var(--paper); padding: 0 10px;
             font-family: 'Caveat', cursive; font-size: 22px; color: var(--ink); letter-spacing: 0.5px; }
  .wb .ann { font-family: 'Caveat', cursive; color: var(--accent); font-size: 18px; line-height: 1.1; }
  .wb .lbl { font-family: 'Architects Daughter', cursive; font-size: 13px; color: var(--ink-soft); letter-spacing: 0.5px; text-transform: uppercase; }
  .wb h-serif { font-family: 'Cormorant Garamond', serif; }

  .sketch-box { border: 1.5px solid var(--rule); border-radius: 3px; position: relative; }
  .sketch-box.dashed { border-style: dashed; }
  .sketch-box.thin { border-width: 1px; }
  .sketch-box.gold { border-color: var(--gold); }
  .sketch-img { background:
      repeating-linear-gradient(45deg, rgba(0,0,0,0.06) 0 1px, transparent 1px 12px),
      var(--paper-2);
      border: 1.5px solid var(--rule); display:flex; align-items:center; justify-content:center;
      color: var(--ink-faint); font-family: 'Architects Daughter', cursive; font-size: 12px;
      text-align:center; padding: 6px;
    }
  .sketch-img .x { position:absolute; inset:0;
      background: linear-gradient(to bottom right, transparent calc(50% - 1px), rgba(0,0,0,0.18) 50%, transparent calc(50% + 1px)),
                  linear-gradient(to top right, transparent calc(50% - 1px), rgba(0,0,0,0.18) 50%, transparent calc(50% + 1px));
      pointer-events: none;
    }
  .sketch-btn { display:inline-flex; align-items:center; gap:6px; padding: 6px 14px;
      border: 1.5px solid var(--ink); border-radius: 999px; font-family: 'Kalam', cursive;
      font-size: 13px; color: var(--ink); background: var(--paper); }
  .sketch-btn.gold { border-color: var(--gold); color: var(--gold); }
  .sketch-btn.filled { background: var(--ink); color: var(--paper); }
  .sketch-btn.wa { background: #1f6b3a; color: white; border-color: #1f6b3a; }
  .sketch-line { height: 6px; border-radius: 2px; background: var(--ink); opacity: 0.85; }
  .sketch-line.thin { height: 3px; opacity: 0.55; }
  .sketch-line.gold { background: var(--gold); }
  .scribble { display:inline-block; height: 10px; border-radius: 2px; background: var(--ink-soft); opacity: 0.7; }

  /* arrow / annotation helpers */
  .arrow {
    position: absolute; font-family: 'Caveat', cursive; color: var(--accent); font-size: 18px;
    line-height: 1.05; pointer-events: none;
  }

  /* Make sure design canvas chrome shows nicely */
  body { font-family: 'Kalam', sans-serif; }
</style>
</head>
<body style="background-color: rgb(19, 19, 19)">
